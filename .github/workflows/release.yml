name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            bin_name: scodex
          - os: macos-14
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            bin_name: scodex
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            bin_name: scodex
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            bin_name: scodex.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Cargo test
        run: cargo test
      - name: Cargo build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package archive (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin_name }} dist/${{ matrix.bin_name }}
          tar -C dist -czf scodex-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.bin_name }}
      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          Compress-Archive -Path "dist/${{ matrix.bin_name }}" -DestinationPath "scodex-${{ github.ref_name }}-${{ matrix.target }}.zip"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: scodex-${{ matrix.target }}
          path: scodex-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_ext }}

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: scodex-*
          path: artifacts
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/scodex-*
